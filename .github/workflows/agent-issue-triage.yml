name: Agent Issue Triage and Publish

on:
  push:
    branches:
      - staging
    paths:
      - '.github/issues/*.md'
  workflow_dispatch:

concurrency:
  group: publish-agent-issues-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  triage-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check token availability
        id: auth
        env:
          UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
          UPSTREAM_REPO: niklas-olsson/keystone-polyphony
        run: |
          if [ -n "$UPSTREAM_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "token_to_use=upstream" >> "$GITHUB_OUTPUT"
          elif [ "$GITHUB_REPOSITORY" = "$UPSTREAM_REPO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "token_to_use=default" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::UPSTREAM_PR_TOKEN is not set and not on canonical repository. Skipping issue publish; leaving files in .github/issues/ for manual follow-up."
          fi

      - name: Setup Python
        if: steps.auth.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.auth.outputs.enabled == 'true'
        run: |
          pip install -r requirements.txt

      - name: Triage and Publish Issues
        if: steps.auth.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token_to_use == 'upstream' && secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}
          LOCAL_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: niklas-olsson/keystone-polyphony
          TRIAGE_AGENTS: ${{ vars.TRIAGE_AGENTS }}
          VARS_JSON: ${{ toJson(vars) }}
          DUCKY_API_KEY: ${{ secrets.DUCKY_API_KEY }}
          DUCKY_MODEL: ${{ vars.DUCKY_MODEL }}
        run: |
          set -euo pipefail
          source scripts/triage-lib.sh

          # Install yq for async triage configuration parsing (if not present)
          if ! command -v yq &> /dev/null; then
              echo "Installing yq..."
              mkdir -p $HOME/.local/bin
              wget -qO $HOME/.local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.35.1/yq_linux_amd64
              chmod +x $HOME/.local/bin/yq
              export PATH=$HOME/.local/bin:$PATH
          fi

          # Export required variables for deduplicate script
          export TRIAGE_AGENTS="${TRIAGE_AGENTS}"
          export DUCKY_API_KEY="${DUCKY_API_KEY}"
          export DUCKY_MODEL="${DUCKY_MODEL}"

          echo "Running deduplication..."
          python3 scripts/deduplicate.py

          shopt -s nullglob
          for file in .github/issues/*.md; do
            echo "Processing issue file: $file"

            # Triage check
            # For triage operations on the local repo, we might need LOCAL_GH_TOKEN
            # if GH_TOKEN is set to UPSTREAM_PR_TOKEN.
            STATUS=$(GH_TOKEN="$LOCAL_GH_TOKEN" ./scripts/triage-dispatch.sh "$file" "$GITHUB_REPOSITORY")
            echo "Triage status for $file: $STATUS"

            if [ "$STATUS" != "ALL_REFINED" ]; then
              echo "Issue $file is not fully refined ($STATUS). Skipping publish."
              continue
            fi

            TITLE=$(get_issue_title "$file")
            # Create a clean body for publishing
            cat "$file" > .github_issues_body.txt

            FINGERPRINT=$(sha256sum "$file" | awk '{print $1}')
            MARKER="agent-issue-fingerprint:$FINGERPRINT"
            EXISTS=$(gh api \
              --method GET \
              /search/issues \
              -f q="repo:$UPSTREAM_REPO type:issue in:body \"$MARKER\"" \
              --jq '.total_count')

            if [ "$EXISTS" -gt 0 ]; then
              echo "Matching upstream issue already exists for $file ($MARKER). Skipping creation."
            else
              {
                cat .github_issues_body.txt
                echo
                echo "---"
                echo "Source file: \`$file\`"
                echo "Source commit: \`${GITHUB_SHA}\`"
                echo "Fingerprint: \`$MARKER\`"
              } > .github_issues_body_enriched.txt

              # Ensure the ready for work label exists on upstream
              if ! gh api "/repos/$UPSTREAM_REPO/labels/ready%20for%20work" > /dev/null 2>&1; then
                echo "Creating missing label: ready for work"
                gh api \
                  --method POST \
                  "/repos/$UPSTREAM_REPO/labels" \
                  -f name="ready for work" \
                  -f color="006B75" \
                  -f description="Issue is ready to be picked up"
              fi

              echo "Publishing issue: $TITLE to $UPSTREAM_REPO"
              ISSUE_URL=$(gh issue create \
                --repo "$UPSTREAM_REPO" \
                --title "Agent Discovery: $TITLE" \
                --body-file .github_issues_body_enriched.txt \
                --label "ready for work")

              # Log discovery for historical record and to ensure PR diff remains mergeable
              ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
              DATE=$(date +%Y-%m-%d)
              AUTHOR="${GITHUB_ACTOR}"

              mkdir -p meta
              if [ ! -f meta/DISCOVERIES.md ]; then
                echo "# Discovery Log" > meta/DISCOVERIES.md
                echo "" >> meta/DISCOVERIES.md
                echo "| Date | Issue | Title | Author |" >> meta/DISCOVERIES.md
                echo "|---|---|---|---|" >> meta/DISCOVERIES.md
              fi
              echo "| $DATE | #$ISSUE_NUMBER | $TITLE | @$AUTHOR |" >> meta/DISCOVERIES.md
            fi

            rm .github_issues_body.txt
            rm -f .github_issues_body_enriched.txt
            # Remove the file from git tracking
            git rm "$file"
          done

      - name: Commit and Push Triage Updates and Issue Removal
        if: steps.auth.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Add all changes including refined issue files and discovery log
          git add .github/issues/*.md meta/DISCOVERIES.md || true

          if ! git diff --staged --quiet; then
            echo "Committing triage updates and removal of processed issues..."
            git commit -m "chore: triage updates and remove published agent issues [skip ci]"
            # Push specifically to the branch that triggered this run
            # Use the identified token for the push
            GH_TOKEN="${{ steps.auth.outputs.token_to_use == 'upstream' && secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}" \
            git push origin "HEAD:${GITHUB_REF#refs/heads/}"
          else
            echo "No changes needed."
          fi
