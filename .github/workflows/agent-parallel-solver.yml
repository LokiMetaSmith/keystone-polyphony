name: CLI Parallel Agent Solver

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number (for manual run)"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'niklas-olsson/keystone-polyphony' &&
      (github.event_name == 'workflow_dispatch' ||
       startsWith(github.event.label.name, 'parallel-'))
    outputs:
      matrix_json: ${{ steps.prepare.outputs.matrix_json }}
      issue_number: ${{ steps.prepare.outputs.issue_number }}
      agent_name: ${{ steps.prepare.outputs.agent_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Issue and Matrix
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Initialize variables
          ISSUE_NUMBER=""
          AGENT_NAME="opencode" # fallback

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ inputs.issue_number }}"
            # Default to jules on manual runs if not specified
            AGENT_NAME="jules"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            LABEL_NAME="${{ github.event.label.name }}"

            # Extract agent name from 'parallel-<agent>'
            if [[ "$LABEL_NAME" =~ ^parallel-(.+)$ ]]; then
              AGENT_NAME="${BASH_REMATCH[1]}"
            fi

            # Label swap: remove parallel-<agent>, add agent-working
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "$LABEL_NAME" --add-label "agent-working"
          fi

          echo "Selected Issue: #$ISSUE_NUMBER"
          echo "Selected Agent: $AGENT_NAME"

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "agent_name=$AGENT_NAME" >> "$GITHUB_OUTPUT"

          # Matrix Configuration
          # Fetch AGENT_PARALLELISM or <AGENT>_PARALLELISM from repository variables
          PARALLELISM=0
          AGENT_UPPER=$(echo "$AGENT_NAME" | tr '[:lower:]' '[:upper:]' | tr '-' '_')

          RAW_VAL=$(gh api "/repos/$REPO/actions/variables/${AGENT_UPPER}_PARALLELISM" --jq '.value // "0"' 2>/dev/null | tr -d '[:space:]' || echo "0")
          if [[ "$RAW_VAL" =~ ^[0-9]+$ ]] && [ "$RAW_VAL" -gt 0 ]; then
             PARALLELISM="$RAW_VAL"
          else
             RAW_GEN=$(gh api "/repos/$REPO/actions/variables/AGENT_PARALLELISM" --jq '.value // "0"' 2>/dev/null | tr -d '[:space:]' || echo "5")
             if [[ "$RAW_GEN" =~ ^[0-9]+$ ]] && [ "$RAW_GEN" -gt 0 ]; then
                 PARALLELISM="$RAW_GEN"
             else
                 PARALLELISM=5 # Hard fallback
             fi
          fi

          echo "Parallelism configured to $PARALLELISM"

          # Construct JSON array [1, 2, ..., N]
          MATRIX_JSON="["
          for ((i=1; i<=$PARALLELISM; i++)); do
             MATRIX_JSON+="$i"
             if [ $i -lt $PARALLELISM ]; then MATRIX_JSON+=", "; fi
          done
          MATRIX_JSON+="]"

          echo "matrix_json=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

          # Bootstrap the single shared branch for all workers
          BRANCH_NAME="feat/agent-$ISSUE_NUMBER"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
             echo "Branch $BRANCH_NAME already exists on origin."
          else
             echo "Creating branch $BRANCH_NAME..."
             git checkout -b "$BRANCH_NAME"
             # Create an empty commit so the branch exists remotely
             git commit --allow-empty -m "chore: initialize branch for parallel swarm workers (issue #$ISSUE_NUMBER)"
             git push origin "$BRANCH_NAME"
          fi

  solve-parallel:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker_id: ${{ fromJson(needs.setup.outputs.matrix_json) }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
      AGENT_CLI: ${{ needs.setup.outputs.agent_name }}
      AGENT_OPENCODE_NPM_PACKAGE: ${{ vars.AGENT_OPENCODE_NPM_PACKAGE || 'opencode-ai@1.2.10' }}
      AGENT_JULES_NPM_PACKAGE: ${{ vars.AGENT_JULES_NPM_PACKAGE || '@google/jules@latest' }}
      AGENT_CLI_FLAGS: ${{ vars.AGENT_CLI_FLAGS }}
      AGENT_MODEL: ${{ vars.AGENT_MODEL }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.setup.outputs.issue_number }}
      # Crucial: the shared keys for Liminal Space
      SWARM_KEY: SWARM_ISSUE_${{ needs.setup.outputs.issue_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/agent-${{ env.ISSUE_NUMBER }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Agent CLI
        run: |
          set -euo pipefail
          if [ "$AGENT_CLI" == "opencode" ]; then
            npm install -g "$AGENT_OPENCODE_NPM_PACKAGE"
          elif [ "$AGENT_CLI" == "jules" ]; then
            # Assuming Jules can be installed via npm or is available in the environment
            npm install -g "$AGENT_JULES_NPM_PACKAGE" || echo "Failed to install Jules via npm. Hoping it is in the PATH."
          fi

      - name: Compose Prompt
        id: prompt
        run: |
          set -euo pipefail
          ISSUE_DATA=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title,body)
          TITLE=$(echo "$ISSUE_DATA" | jq -r .title)
          BODY=$(echo "$ISSUE_DATA" | jq -r .body)

          {
            echo "Issue #$ISSUE_NUMBER: $TITLE"
            echo ""
            echo "WORKSPACE INSTRUCTION: You are Worker #${{ matrix.worker_id }} in a parallel Swarm."
            echo "You MUST synchronize and coordinate with other autonomous agents running in parallel on this branch."
            echo "Use the Liminal Bridge and Batons (Locks) to safely edit files."
            echo ""
            echo "## Issue Description"
            echo "$BODY"
            echo ""
            if [ -f AGENTS.md ]; then
              echo "Repository Conventions (AGENTS.md):"
              cat AGENTS.md
              echo ""
            fi

          } > agent_prompt.txt

      - name: Run Agent
        run: |
          set -euo pipefail

          CMD=("$AGENT_CLI")

          if [ -n "$AGENT_CLI_FLAGS" ]; then
            read -ra FLAGS <<< "$AGENT_CLI_FLAGS"
            CMD+=("${FLAGS[@]}")
          fi

          if [[ "$AGENT_CLI" == "opencode" ]]; then
            CMD+=("--non-interactive")
          fi
          # Add flags for jules if necessary
          # if [[ "$AGENT_CLI" == "jules" ]]; then
          #   CMD+=("--yolo")
          # fi

          if [ -n "$AGENT_MODEL" ]; then
            CMD+=("--model" "$AGENT_MODEL")
          fi

          PROMPT_CONTENT=$(cat agent_prompt.txt)
          CMD+=("--prompt" "$PROMPT_CONTENT")

          KEY_PROVIDER="openrouter"
          case "${AGENT_MODEL:-}" in
            anthropic/*) KEY_PROVIDER="anthropic" ;;
            google/*)    KEY_PROVIDER="google" ;;
            grok/*)      KEY_PROVIDER="grok" ;;
            deepseek/*)  KEY_PROVIDER="deepseek" ;;
          esac

          ENV_VARS=()
          if [ -n "${AGENT_API_KEY:-}" ]; then
            ENV_VARS+=("AGENT_API_KEY=$AGENT_API_KEY")
            case "$KEY_PROVIDER" in
              anthropic) ENV_VARS+=("ANTHROPIC_API_KEY=$AGENT_API_KEY") ;;
              google)    ENV_VARS+=("GEMINI_API_KEY=$AGENT_API_KEY") ;;
              grok)      ENV_VARS+=("GROK_API_KEY=$AGENT_API_KEY") ;;
              deepseek)  ENV_VARS+=("DEEPSEEK_API_KEY=$AGENT_API_KEY") ;;
              openrouter)
                ENV_VARS+=("OPENAI_API_KEY=$AGENT_API_KEY")
                ENV_VARS+=("OPENROUTER_API_KEY=$AGENT_API_KEY")
                ENV_VARS+=("OPENAI_API_BASE=https://openrouter.ai/api/v1")
                ;;
            esac
          fi

          echo "Running agent (Worker ${{ matrix.worker_id }}): ${CMD[0]} ... (redacted prompt)"

          set +e
          if [ "${#ENV_VARS[@]}" -gt 0 ]; then
            env "${ENV_VARS[@]}" "${CMD[@]}"
          else
            "${CMD[@]}"
          fi
          EXIT_CODE=$?
          set -e

          echo "agent_exit_code=$EXIT_CODE" >> "$GITHUB_ENV"

      - name: Robust Pull-Rebase-Push
        if: always()
        run: |
          # Even if the agent failed, it might have made some local commits or changes
          set -euo pipefail
          BRANCH_NAME="feat/agent-${{ env.ISSUE_NUMBER }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are local uncommitted changes
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "feat/agent-${{ env.ISSUE_NUMBER }}: (worker ${{ matrix.worker_id }}) intermediate progress"
          fi

          # Loop to handle contention when multiple agents push simultaneously
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempting pull --rebase and push (Attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."

            # Fetch the latest from origin, rebase our local changes on top
            # If there's a serious git conflict (e.g. they both edited the exact same lines without baton),
            # this will fail and abort the rebase.
            set +e
            git pull --rebase origin "$BRANCH_NAME"
            PULL_STAT=$?
            set -e

            if [ $PULL_STAT -ne 0 ]; then
              echo "Git rebase conflict detected. Attempting to abort and retry later..."
              git rebase --abort || true

              # If we can't resolve it, sleep random time to desync runners and try again
              sleep $(( (RANDOM % 5) + 2 ))
              RETRY_COUNT=$((RETRY_COUNT+1))
              continue
            fi

            # Rebase was successful, try to push
            set +e
            git push origin "$BRANCH_NAME"
            PUSH_STAT=$?
            set -e

            if [ $PUSH_STAT -eq 0 ]; then
               echo "Successfully pushed changes!"
               SUCCESS=1
               break
            else
               echo "Push failed (likely another runner pushed). Retrying..."
               sleep $(( (RANDOM % 3) + 1 ))
               RETRY_COUNT=$((RETRY_COUNT+1))
            fi
          done

          if [ $SUCCESS -eq 0 ]; then
             echo "Failed to safely push changes to origin/$BRANCH_NAME after $MAX_RETRIES retries."
             exit 1
          fi

      - name: Propagate Agent Failure
        if: env.agent_exit_code != '0'
        run: |
          echo "Agent CLI exited with code ${AGENT_EXIT_CODE}"
          exit ${AGENT_EXIT_CODE}
        env:
          AGENT_EXIT_CODE: ${{ env.agent_exit_code }}

  finalize:
    needs: [setup, solve-parallel]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.solve-parallel.result }}" == "success" ]; then
            echo "All workers succeeded."
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "label=agent-pr" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.solve-parallel.result }}" == "skipped" ]; then
            echo "Workers were skipped."
            echo "create_pr=false" >> "$GITHUB_OUTPUT"
            echo "label=" >> "$GITHUB_OUTPUT"
          else
            echo "Some or all workers failed."
            # We still create the PR, maybe partial progress was made
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "label=agent-failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.status.outputs.create_pr == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or Update Pull Request
        if: steps.status.outputs.create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.setup.outputs.issue_number }}
        run: |
          set -euo pipefail
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title -q .title)
          BRANCH_NAME="feat/agent-$ISSUE_NUMBER"

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --repo "$REPO" --json number --jq '.[0].number' || echo "")

          if [ -z "$EXISTING_PR" ] || [ "$EXISTING_PR" == "null" ]; then
             echo "Creating PR for issue #$ISSUE_NUMBER"
             gh pr create \
               --repo "$REPO" \
               --title "feat/agent-$ISSUE_NUMBER: $ISSUE_TITLE (Swarm)" \
               --body "Closes #$ISSUE_NUMBER. Solved in parallel by an agent swarm." \
               --head "$BRANCH_NAME" \
               --base main \
               --label "${{ steps.status.outputs.label }}"
          else
             echo "PR already exists: #$EXISTING_PR"
             # Optionally update labels based on final status
             gh pr edit "$EXISTING_PR" --repo "$REPO" --add-label "${{ steps.status.outputs.label }}"
          fi

          # Remove working label
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "agent-working" || true
