name: Auto-merge PR to Staging

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-staging
  cancel-in-progress: false

jobs:
  check-workflow-changes:
    # Detect whether the PR touches any workflow files.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      has_workflow_changes: ${{ steps.detect.outputs.has_workflow_changes }}
    steps:
      - name: Check for workflow file changes
        id: detect
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          FILES=$(gh api "/repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[] .filename')

          if echo "$FILES" | grep -q '^.github/workflows/'; then
            echo "PR #$PR_NUMBER modifies workflow files."
            echo "has_workflow_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No workflow file changes detected."
            echo "has_workflow_changes=false" >> "$GITHUB_OUTPUT"
          fi

  request-workflow-review:
    # If workflow files were touched, label the PR and ask for review.
    needs: check-workflow-changes
    if: needs.check-workflow-changes.outputs.has_workflow_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Label and comment
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWERS: ${{ vars.WORKFLOW_REVIEWERS || 'niklas-olsson' }}
        run: |
          set -euo pipefail

          if ! gh api "/repos/$REPO/labels/workflow-review" > /dev/null 2>&1; then
            echo "Creating missing label: workflow-review"
            gh api --method POST "/repos/$REPO/labels" \
              -f name="workflow-review" \
              -f color="E4E669" \
              -f description="PR modifies workflow files and requires review before staging merge"
          fi

          # Add label
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "workflow-review"

          # Post comment tagging reviewers
          COMMENT="PR #$PR_NUMBER modifies workflow files in \`.github/workflows/\`.

          Automatic merge is disabled for security. @$REVIEWERS please review and approve these changes. Once approved, the PR will be merged to staging automatically."

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT"

  merge-to-staging:
    # Open-by-default policy: any non-draft PR to main can flow into staging,
    # UNLESS it modifies .github/workflows/ files (those need review first).
    needs: check-workflow-changes
    if: needs.check-workflow-changes.outputs.has_workflow_changes == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup or checkout staging branch
        run: |
          git fetch origin main staging || git fetch origin main
          # Use existing remote staging when available, otherwise initialize from main.
          if git show-ref --verify --quiet refs/remotes/origin/staging; then
            git checkout -B staging origin/staging
          else
            git checkout -B staging origin/main
          fi

      - name: Merge PR into staging
        run: |
          # Fetch the PR branch into a local ref
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          # Merge it into staging
          git merge pr-branch --no-edit
          # Push back to origin
          git push origin staging
