name: Auto-PR to Upstream

on:
  schedule:
    # Run once a day at midnight. Adjust as needed.
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-pr-to-upstream:
    runs-on: ubuntu-latest
    # Only run this if the repository is a fork (not the upstream)
    if: github.repository != 'niklas-olsson/keystone-polyphony'
    env:
      UPSTREAM_REPO: niklas-olsson/keystone-polyphony
      BASE_BRANCH: main
      FORK_OWNER: ${{ github.repository_owner }}
      HEAD_BRANCH: ${{ github.repository_owner }}:main
      GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check token availability
        id: auth
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping auto-PR. Set secret UPSTREAM_PR_TOKEN with permission to open PRs on $UPSTREAM_REPO."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify upstream access
        if: steps.auth.outputs.enabled == 'true'
        run: |
          gh api "repos/$UPSTREAM_REPO" >/dev/null

      - name: Create Pull Request
        if: steps.auth.outputs.enabled == 'true'
        run: |
          # We add the upstream remote to check for commit diffs
          git remote add upstream https://github.com/$UPSTREAM_REPO.git
          git fetch upstream "$BASE_BRANCH"
          
          AHEAD=$(git rev-list --count "upstream/$BASE_BRANCH..HEAD")
          
          if [ "$AHEAD" -eq "0" ]; then
            echo "No new commits to PR to upstream. Skipping."
            exit 0
          fi
          
          # Check if a PR already exists from this branch to the upstream to avoid duplicates
          EXISTING_PR=$(gh pr list \
            --repo "$UPSTREAM_REPO" \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number -q '.[0].number')
            
          if [ "$EXISTING_PR" != "null" ] && [ -n "$EXISTING_PR" ]; then
            echo "An open PR to upstream already exists (#$EXISTING_PR)."
            exit 0
          fi
          
          echo "Creating PR..."
          gh pr create \
            --repo "$UPSTREAM_REPO" \
            --title "Automated Submissions from fork (${FORK_OWNER})" \
            --body "This automated PR merges the latest changes from the fork \`${FORK_OWNER}\` into the upstream repository." \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH"
