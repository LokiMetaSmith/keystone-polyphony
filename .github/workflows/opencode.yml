name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      model:
        description: "Model to use"
        required: false
        default: "opencode/big-pickle"
      prompt:
        description: "Custom prompt"
        required: true

concurrency:
  # Including event_name prevents simultaneous pull_request and pull_request_target from cancelling each other.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      github.repository == 'niklas-olsson/keystone-polyphony' &&
      ((github.event_name == 'issue_comment' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))) ||
       (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))) ||
       ((github.event_name == 'pull_request' || github.event_name == 'pull_request_target') &&
        ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
         (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository)) &&
        (contains(github.event.label.name, '-review') ||
         contains(github.event.pull_request.labels.*.name, 'workflow-review') ||
         contains(github.event.pull_request.labels.*.name, 'arch-review') ||
         contains(github.event.pull_request.labels.*.name, 'security-review'))) ||
       (github.event_name == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
       - name: Checkout repository
         uses: actions/checkout@v4
         with:
           # Explicitly reference the head repository for forks to ensure checkout succeeds.
           repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
           # For pull_request_target, we want the PR's head code.
           ref: ${{ github.event.pull_request.head.sha || (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number)) || github.sha }}
           fetch-depth: 1
           persist-credentials: false

       - name: Handle Label-Triggered Review
         id: label_prompt
         if: (github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && (contains(github.event.label.name, '-review') || contains(github.event.pull_request.labels.*.name, 'workflow-review') || contains(github.event.pull_request.labels.*.name, 'arch-review') || contains(github.event.pull_request.labels.*.name, 'security-review'))
         run: |
           set -euo pipefail
           LABEL="${{ github.event.label.name }}"
           if [ -z "$LABEL" ] || [ "$LABEL" = "null" ]; then
             # Try to find a review label in the PR labels array
             LABEL=$(echo "${{ join(github.event.pull_request.labels.*.name, ' ') }}" | tr ' ' '\n' | grep -E ".*-review$" | head -n 1 || echo "")
           fi

           if [ -z "$LABEL" ]; then
             echo "Error: No review label found in event or PR labels."
             exit 1
           fi

           PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
           echo ">>> Resolving review for PR #$PR_NUMBER (Label: $LABEL)"

           # Get changed files in the PR, ensuring we target the upstream repo
           # Explicitly target upstream for fork PR resolution
           UPSTREAM_REPO="${{ github.repository }}"
           CHANGED_FILES=$(gh pr view "$PR_NUMBER" --repo "$UPSTREAM_REPO" --json files --jq '.files[].path' || echo "")

           case "$LABEL" in
             "workflow-review")
               FILES=$(echo "$CHANGED_FILES" | grep -E "^\.github/workflows/|^docs/ci-cd\.md" || echo "")
               GUIDE="docs/ci-cd.md"
               COMMAND="/oc review-workflow"
               DESC="Deep dive into the changed files listed below. Use $GUIDE as the primary guideline for security, permissions, and best practices."
               ;;
             "arch-review")
               FILES=$(echo "$CHANGED_FILES" | grep -vE "^docs/|^meta/" || echo "")
               GUIDE="README.md, docs/architecture.md, and AGENTS.md"
               COMMAND="/oc review-arch"
               DESC="Analyze how the changed files listed below align with the project architecture defined in $GUIDE."
               ;;
             "security-review")
               FILES=$(echo "$CHANGED_FILES" | grep -E "secret|token|perm|auth|config|scripts/inject-secrets\.sh|\.github/workflows/" || echo "")
               GUIDE="AGENTS.md and docs/architecture.md"
               COMMAND="/oc review-security"
               DESC="Audit the changed files listed below for secret handling, token scopes, and potential vulnerabilities, using $GUIDE as context."
               ;;
             *)
               FILES="$CHANGED_FILES"
               GUIDE="README.md"
               COMMAND="/oc review"
               DESC="Perform a general review of the changed files below based on the $LABEL tag, using $GUIDE as context."
               ;;
           esac

           if [ -z "$FILES" ]; then
             echo "No relevant files found for $LABEL. Performing general PR review."
             FILES="$CHANGED_FILES"
           fi

           # Format file list for the prompt
           FILE_LIST=$(echo "$FILES" | head -n 10 | sed 's/^/- /')
           if [ $(echo "$FILES" | wc -l) -gt 10 ]; then
             FILE_LIST="$FILE_LIST"$'\n'"- ... and others"
           fi

           PROMPT="$COMMAND: $DESC"$'\n\n'"**Target Files:**"$'\n'"$FILE_LIST"

           echo "prompt<<EOF" >> "$GITHUB_OUTPUT"
           echo "$PROMPT" >> "$GITHUB_OUTPUT"
           echo "EOF" >> "$GITHUB_OUTPUT"

           gh pr comment "$PR_NUMBER" --repo "$UPSTREAM_REPO" --body "$PROMPT"
         env:
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

       - name: Prepare Environment
         id: prep
         run: |
           set -euo pipefail
           MODEL="${{ github.event.inputs.model || 'opencode/big-pickle' }}"

           # Resolve prompt from multiple sources
           PROMPT="${{ github.event.inputs.prompt || steps.label_prompt.outputs.prompt || github.event.comment.body }}"

           if [ -z "$PROMPT" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
             echo "Error: No prompt provided for event type: ${{ github.event_name }}"
             exit 1
           fi

           # Determine which API key to pass based on model
           # We use a pattern where we map the correct secret to PROVIDER_API_KEY
           case "$MODEL" in
             anthropic/*) KEY="${{ secrets.ANTHROPIC_API_KEY }}" ;;
             google/*)    KEY="${{ secrets.GEMINI_API_KEY }}" ;;
             grok/*)      KEY="${{ secrets.GROK_API_KEY }}" ;;
             deepseek/*)  KEY="${{ secrets.DEEPSEEK_API_KEY }}" ;;
             *)           KEY="${{ secrets.OPENROUTER_API_KEY }}" ;;
           esac

           echo "model=$MODEL" >> "$GITHUB_OUTPUT"
           echo "provider_key=$KEY" >> "$GITHUB_OUTPUT"

       - name: Run OpenCode
         run: |
           set -euo pipefail

           # Build command using bash array for safe argument handling
           # We use npx -y opencode-ai to ensure the CLI is available
           CMD=("npx" "-y" "opencode-ai" "review")

           CMD+=("--non-interactive")

           if [ -n "${{ steps.prep.outputs.model }}" ]; then
             CMD+=("--model" "${{ steps.prep.outputs.model }}")
           fi

           # Resolve prompt from multiple sources
           PROMPT="${{ github.event.inputs.prompt || steps.label_prompt.outputs.prompt || github.event.comment.body }}"

           CMD+=("--prompt" "$PROMPT")

           echo ">>> Running OpenCode: npx opencode-ai review --model ${{ steps.prep.outputs.model }} ..."

           # Execute the command
           "${CMD[@]}"
         env:
           # We pass only the relevant key as the generic OPENAI_API_KEY
           # which many OpenRouter/OpenAI compatible models expect.
           ANTHROPIC_API_KEY: ${{ steps.prep.outputs.provider_key }}
           OPENAI_API_KEY: ${{ steps.prep.outputs.provider_key }}
           OPENROUTER_API_KEY: ${{ steps.prep.outputs.provider_key }}
           GROK_API_KEY: ${{ steps.prep.outputs.provider_key }}
           GEMINI_API_KEY: ${{ steps.prep.outputs.provider_key }}
           DEEPSEEK_API_KEY: ${{ steps.prep.outputs.provider_key }}
           OPENAI_API_BASE: https://openrouter.ai/api/v1
           # The CLI uses GITHUB_TOKEN to post reviews/comments
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

       - name: Ensure Reviewed Label
         if: always() && (github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && (contains(github.event.label.name, '-review') || contains(github.event.pull_request.labels.*.name, 'workflow-review') || contains(github.event.pull_request.labels.*.name, 'arch-review') || contains(github.event.pull_request.labels.*.name, 'security-review'))
         run: |
           gh api --method POST "/repos/${{ github.repository }}/labels" \
             -f name="reviewed" \
             -f color="FBCA04" \
             -f description="AI review complete, action required by author" || true
         env:
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

       - name: Cleanup Review Label
         if: always() && (github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && (contains(github.event.label.name, '-review') || contains(github.event.pull_request.labels.*.name, 'workflow-review') || contains(github.event.pull_request.labels.*.name, 'arch-review') || contains(github.event.pull_request.labels.*.name, 'security-review'))
         run: |
           PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
           LABEL="${{ github.event.label.name }}"
           if [ -z "$LABEL" ] || [ "$LABEL" = "null" ]; then
             LABEL=$(echo "${{ join(github.event.pull_request.labels.*.name, ' ') }}" | tr ' ' '\n' | grep -E ".*-review$" | head -n 1 || echo "")
           fi
           if [ -n "$LABEL" ]; then
             gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --remove-label "$LABEL" --add-label "reviewed"
           fi
         env:
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

       - name: Handle Failure
         if: failure()
         run: |
           PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
           if [ -n "$PR_NUMBER" ]; then
             gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "## ❌ OpenCode Review Failed

             The automated review encountered an error. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
           fi
         env:
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
