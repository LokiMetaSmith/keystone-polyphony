name: Issue Reviewer

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: issue-review
  cancel-in-progress: false

jobs:
  assign-review:
    # Only run on upstream and only when the issue has the pre-review label.
    if: >-
      github.repository == 'niklas-olsson/keystone-polyphony' &&
      (github.event_name == 'workflow_dispatch' ||
       contains(github.event.issue.labels.*.name, 'pre-review'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure labels exist
        run: |
          set -euo pipefail

          ensure_label() {
            local NAME="$1" COLOR="$2" DESC="$3"
            if ! gh api "/repos/$REPO/labels/$NAME" > /dev/null 2>&1; then
              echo "Creating missing label: $NAME"
              gh api \
                --method POST \
                "/repos/$REPO/labels" \
                -f name="$NAME" \
                -f color="$COLOR" \
                -f description="$DESC"
            fi
          }

          # Load reviewer labels from config
          REVIEWER_LABELS=$(yq '.reviewers[].label' .github/reviewers.yml)
          for LBL in $REVIEWER_LABELS; do
            ensure_label "$LBL" "5319E7" "Assigned to $LBL for AI review"
          done

          ensure_label "reviewed"       "0E8A16" "Issue has been reviewed and approved"
          ensure_label "ready for work" "006B75" "Issue is ready to be picked up"
          ensure_label "quota-hold"     "D93F0B" "Waiting for daily reviewer quota to reset"

      - name: Collect eligible issues
        id: collect
        run: |
          set -euo pipefail

          # Get all reviewer labels as a JSON array
          REVIEWER_LABELS_JSON=$(yq '.reviewers[].label' .github/reviewers.yml | jq -R . | jq -s -c .)
          echo "Configured reviewer labels: $REVIEWER_LABELS_JSON"

          # For labeled events, process only the triggering issue.
          # For workflow_dispatch (sweep), find all pre-review issues missing ALL reviewer labels.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUES=$(gh api "/repos/$REPO/issues?labels=pre-review&state=open&per_page=100" \
              --jq "--argjson labels '$REVIEWER_LABELS_JSON' '[.[] | select(.labels | map(.name) | any(.[] ; . as \$x | \$labels | index(\$x)) | not )] | [.[].number] | join(\" \")'")
          else
            NUM="${{ github.event.issue.number }}"
            # Check if it already has any reviewer label
            HAS_REVIEWER=$(gh api "/repos/$REPO/issues/$NUM/labels" \
              --jq "--argjson labels '$REVIEWER_LABELS_JSON' '[.[].name] | any(.[] ; . as \$x | \$labels | index(\$x)) | if . then \"true\" else empty end'")

            if [ "$HAS_REVIEWER" = "true" ]; then
              echo "Issue #$NUM already has a reviewer label. Skipping."
              ISSUES=""
            else
              ISSUES="$NUM"
            fi
          fi

          if [ -z "$ISSUES" ]; then
            echo "No eligible issues to process."
            echo "issues=" >> "$GITHUB_OUTPUT"
          else
            echo "Eligible issues: $ISSUES"
            echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"
          fi

      - name: Check quota and assign
        if: steps.collect.outputs.issues != ''
        run: |
          set -euo pipefail

          REVIEWERS_JSON=$(yq -o json . .github/reviewers.yml | jq -c '.reviewers')
          NUM_REVIEWERS=$(echo "$REVIEWERS_JSON" | jq 'length')
          if [ "$NUM_REVIEWERS" -le 0 ]; then
            echo "No reviewers configured in .github/reviewers.yml"
            exit 1
          fi

          SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)

          for ISSUE_NUMBER in ${{ steps.collect.outputs.issues }}; do
            # Round-robin selection based on issue number
            INDEX=$((ISSUE_NUMBER % NUM_REVIEWERS))
            REVIEWER=$(echo "$REVIEWERS_JSON" | jq -c ".[$INDEX]")

            NAME=$(echo "$REVIEWER" | jq -r '.name')
            HANDLE=$(echo "$REVIEWER" | jq -r '.handle')
            LABEL=$(echo "$REVIEWER" | jq -r '.label')
            QUOTA_VAR=$(echo "$REVIEWER" | jq -r '.quota_var')

            echo "Reviewer for issue #$ISSUE_NUMBER: $NAME ($LABEL) using $QUOTA_VAR"

            # Fetch quota limit from repository variables
            LIMIT=$(gh api "/repos/$REPO/actions/variables/$QUOTA_VAR" --jq '.value' 2>/dev/null || echo "0")
            if [ "$LIMIT" -eq 0 ]; then
              echo "Quota variable $QUOTA_VAR not set or 0. No quota limit enforced."
              LIMIT=999999
            fi

            # Count issues assigned to this reviewer in last 24h
            REV_ISSUES=$(gh api "/repos/$REPO/issues?labels=$LABEL&state=all&per_page=100" --jq '.[].number')
            ASSIGNED_TODAY=0
            for RNUM in $REV_ISSUES; do
              LABELED_AT=$(gh api "/repos/$REPO/issues/$RNUM/timeline" \
                --jq "[.[] | select(.event == \"labeled\" and .label.name == \"$LABEL\")] | last | .created_at // empty" 2>/dev/null || echo "")
              if [ -n "$LABELED_AT" ] && [[ "$LABELED_AT" > "$SINCE" ]]; then
                ASSIGNED_TODAY=$((ASSIGNED_TODAY + 1))
              fi
            done
            echo "Issues assigned to $NAME in last 24h: $ASSIGNED_TODAY / $LIMIT"

            if [ "$ASSIGNED_TODAY" -ge "$LIMIT" ]; then
              echo "Quota reached for $NAME. Holding issue #$ISSUE_NUMBER."
              gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "quota-hold" 2>/dev/null || true
              continue
            fi

            echo "Assigning $NAME to issue #$ISSUE_NUMBER"

            # Remove quota-hold if present from a previous cycle
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "quota-hold" 2>/dev/null || true

            # Apply reviewer label
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$LABEL"

            # Post review instructions (idempotent)
            COMMENT_ID="reviewer-instructions"
            EXISTING=$(gh api "/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
              --jq "[.[] | select(.body | contains(\"$COMMENT_ID\"))] | length")

            if [ "$EXISTING" -eq 0 ]; then
              COMMENT_BODY="<!-- $COMMENT_ID -->
          ## 🤖 $NAME Review Requested

          $HANDLE — Please review this issue against the goals of **Keystone Polyphony** and ensure it meets the following acceptance criteria:

          1. **Human Interaction Story** — Does this issue contain a clear narrative of how a human contributor will interact with the feature?
          2. **BDD Feature File** — Does this issue include a complete Cucumber BDD \`.feature\` file? Is it reviewed for completeness?
          3. **Self-Contained** — Is this issue self-contained? Are prerequisites explicitly listed and marked as blocking?

          Once your review is complete, please:
          - Remove the \`pre-review\` label
          - Add the \`reviewed\` and \`ready for work\` labels"
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$COMMENT_BODY"
            fi
          done
