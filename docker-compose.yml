services:
  # The Anchor Node
  # This service runs the Python server in "seed" mode,
  # keeping the DHT connection alive and performing architect duties.
  anchor:
    build: .
    container_name: liminal-anchor
    environment:
      # Pass SWARM_KEY and DUCKY_API_KEY from environment
      # Set them in .env or pass them explicitly with docker compose run -e ...
      - SWARM_KEY=${SWARM_KEY:-liminal-default-secret}
      - DUCKY_API_KEY=${DUCKY_API_KEY:-}
      - PYTHONUNBUFFERED=1
    command: python src/liminal_bridge/server.py --mode=seed
    restart: unless-stopped
    volumes:
      # Persist DB/Identity
      - ./liminal_anchor_data:/app/liminal_data

  # Optional: Verification Client
  # Run this service to verify connectivity
  verify-client:
    build: .
    container_name: liminal-verify
    environment:
      - SWARM_KEY=${SWARM_KEY:-liminal-default-secret}
      - DUCKY_API_KEY=${DUCKY_API_KEY:-}
      - PYTHONUNBUFFERED=1
    command: python src/liminal_bridge/server.py --mode=verify
    # Only run this service if explicitly requested
    profiles:
      - verify
    depends_on:
      - anchor
